<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PTjo — Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body { background: #0f1117; color: #e5e7eb; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center gap-8 p-8">

    <div class="text-center">
        <div class="text-teal-400 text-6xl mb-4"><i class="fas fa-shield-halved"></i></div>
        <h1 class="text-3xl font-bold text-white mb-2">PTjo Admin Panel</h1>
        <p class="text-gray-400 text-sm">Platform administration &amp; oversight</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 w-full max-w-3xl">
        <a href="../Customer_Dashboard/Customer_Dashboard.html"
           class="flex flex-col items-center gap-3 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-2xl p-6 transition-all duration-200 hover:scale-105">
            <i class="fas fa-users text-3xl text-blue-400"></i>
            <span class="font-semibold text-white">Customers</span>
            <span class="text-xs text-gray-400">View customer dashboard</span>
        </a>
        <a href="../Hacker_Dashboard/HackerDashboard.html"
           class="flex flex-col items-center gap-3 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-2xl p-6 transition-all duration-200 hover:scale-105">
            <i class="fas fa-user-secret text-3xl text-teal-400"></i>
            <span class="font-semibold text-white">Hackers</span>
            <span class="text-xs text-gray-400">View hacker dashboard</span>
        </a>
        <a href="../LogIn/Login.html"
           class="flex flex-col items-center gap-3 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-2xl p-6 transition-all duration-200 hover:scale-105">
            <i class="fas fa-right-to-bracket text-3xl text-yellow-400"></i>
            <span class="font-semibold text-white">Login</span>
            <span class="text-xs text-gray-400">Go to login page</span>
        </a>
    </div>

    <div id="admin-stats" class="w-full max-w-3xl bg-gray-800 border border-gray-700 rounded-2xl p-6">
        <h2 class="text-white font-bold text-lg mb-4 flex items-center gap-2">
            <i class="fas fa-chart-bar text-teal-400"></i> Quick Stats
        </h2>
        <div id="stats-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-center">
            <div class="animate-pulse bg-gray-700 rounded-xl p-4 h-16"></div>
            <div class="animate-pulse bg-gray-700 rounded-xl p-4 h-16"></div>
            <div class="animate-pulse bg-gray-700 rounded-xl p-4 h-16"></div>
            <div class="animate-pulse bg-gray-700 rounded-xl p-4 h-16"></div>
        </div>
    </div>

    <button onclick="doLogout()"
        class="text-gray-400 hover:text-red-400 text-sm flex items-center gap-2 transition">
        <i class="fas fa-right-from-bracket"></i> Log Out
    </button>

    <script>
    async function doLogout() {
        try {
            await fetch('../api/auth/logout.php', { method: 'POST', credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' } });
        } catch(e) {}
        window.location.href = '../LogIn/Login.html';
    }

    // Load basic stats from session endpoint
    document.addEventListener('DOMContentLoaded', async function() {
        try {
            var res = await fetch('../api/auth/session.php', { credentials: 'same-origin',
                headers: { 'X-Requested-With': 'XMLHttpRequest' } });
            var data = await res.json();
            if (!data.ok) { window.location.href = '../LogIn/Login.html'; return; }
            if (data.user && data.user.role !== 'admin') {
                // Redirect non-admins to their own dashboard
                window.location.href = data.user.role === 'hacker'
                    ? '../Hacker_Dashboard/HackerDashboard.html'
                    : '../Customer_Dashboard/Customer_Dashboard.html';
                return;
            }
        } catch(e) {
            window.location.href = '../LogIn/Login.html';
        }
    });
    </script>
</body>
</html>
