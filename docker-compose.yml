services:

  web:
    image: php:8.2-apache
    container_name: ptjo_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ptjo
      DB_USER: ptjo_user
      DB_PASS: ptjo_pass
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "
        docker-php-ext-install pdo pdo_mysql &&
        a2enmod rewrite &&
        apache2-foreground
      "

  db:
    image: mysql:8.0
    container_name: ptjo_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ptjo
      MYSQL_USER: ptjo_user
      MYSQL_PASSWORD: ptjo_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.mysql.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.mysql.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ptjo_user", "--password=ptjo_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db_data:
