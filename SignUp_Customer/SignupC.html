<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTjo - Sign Up / Login</title>
    <!--
      The customer sign-up / login experience now lives at the canonical
      LogIn/Login.html page. This file is kept only as a redirect so existing
      links and the Signup.php error/success redirects keep working.
      Any query params (tab, role, error, signup, …) are forwarded verbatim.
    -->
    <script>
        (function () {
            // This URL is the "sign up" entry point — default to the signup tab,
            // while forwarding any other params (role, error, …) verbatim.
            var params = new URLSearchParams(window.location.search);
            if (!params.has('tab')) params.set('tab', 'signup');
            window.location.replace('../LogIn/Login.html?' + params.toString());
        })();
    </script>
</head>
<body>
    <noscript>
        <p>Please <a href="../LogIn/Login.html?tab=signup">continue to sign up or log in</a>.</p>
    </noscript>
</body>
</html>
