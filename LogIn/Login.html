<script>
document.addEventListener('DOMContentLoaded', () => {
    const errorMessageDiv = document.getElementById('error-message');
    const successMessageDiv = document.getElementById('success-message');
    const urlParams = new URLSearchParams(window.location.search);

    // Check for login errors from CheckLogin.php
    const error = urlParams.get('error');
    if (error) {
        errorMessageDiv.textContent = decodeURIComponent(error);
        errorMessageDiv.classList.remove('hidden');
    }

    // Check for signup success from Signup.php
    const signupSuccess = urlParams.get('signup');
    if (signupSuccess === 'success') {
        successMessageDiv.classList.remove('hidden');
    }
    
    // Clear URL parameters after showing messages (optional but cleaner)
    if (error || signupSuccess) {
        window.history.replaceState(null, null, window.location.pathname);
    }

    const dropdowns = [
        { toggle: document.getElementById('dropdown-toggle-products'), menu: document.getElementById('dropdown-menu-products') },
        { toggle: document.getElementById('dropdown-toggle-industries'), menu: document.getElementById('dropdown-menu-industries') }
    ].filter(d => d.toggle && d.menu);
    const closeAllDd = () => {
        dropdowns.forEach(d => {
            d.menu.classList.remove('dropdown-active');
            d.menu.classList.add('hidden');
            d.toggle.querySelector('.dropdown-toggle-svg')?.classList.remove('active');
        });
    };
    dropdowns.forEach(d => {
        d.toggle.addEventListener('click', e => {
            e.stopPropagation();
            const open = d.menu.classList.contains('dropdown-active') && !d.menu.classList.contains('hidden');
            closeAllDd();
            if (!open) {
                d.menu.classList.remove('hidden');
                d.menu.classList.add('dropdown-active');
                d.toggle.querySelector('.dropdown-toggle-svg')?.classList.add('active');
            }
        });
    });
    document.addEventListener('click', closeAllDd);
});

</script>
